<svg width="280" height="70" viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Flowing Purple/Pink/Red Gradient -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="25%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#A932FF" />
      <stop offset="75%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8A2BE2" />
      <animate attributeName="x1" values="0%;-100%" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" values="200%;100%" dur="3s" repeatCount="indefinite" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#gradient); rx: 25; stroke: rgba(255,255,255,0.3); stroke-width: 1px; }
    .text { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px; 
      font-weight: 800; 
      fill: #ffffff; 
      letter-spacing: 1.5px;
    }
    .arrow {
      animation: bounce 1.5s infinite ease-in-out;
      transform-origin: center;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }
    .pulse-container {
      animation: opacityPulse 3s infinite ease-in-out;
      cursor: pointer;
    }
    @keyframes opacityPulse {
      0%, 100% { opacity: 1; filter: brightness(1); }
      50% { opacity: 0.95; filter: brightness(1.2); }
    }
  </style>

  <g class="pulse-container" filter="url(#glow)">
    <!-- Button Background -->
    <rect x="10" y="10" width="260" height="50" class="bg" />
    
    <!-- Text -->
    <text x="45" y="41" class="text">DOWNLOAD APK</text>
    
    <!-- Animated Icon -->
    <g class="arrow" transform="translate(225, 23)">
      <path d="M0,0 L0,15 M-6,9 L0,15 L6,9" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
    <!-- Static Base Line for Icon -->
    <path d="M217,42 L233,42" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
  </g>
</svg>